# HTTPS 片段 — 域名备案 + SSL 证书就绪后，与 nginx.conf 合并或替换 listen 80 块
#
# 1. 腾讯云 SSL 证书下载 Nginx 版，放到 /etc/nginx/ssl/
# 2. server_name 改为你的 API 域名
# 3. .env 中 PUBLIC_BASE_URL=https://api.yourdomain.com
# 4. pm2 restart mengji-api

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/nginx/ssl/api.yourdomain.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/api.yourdomain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}
