# 梦悸 API — Nginx 反代模板
# 复制到 /etc/nginx/sites-available/mengji-api 并软链到 sites-enabled
#
# 域名备案前：将 server_name 改为 CVM 公网 IP，仅用 HTTP
# 备案完成后：启用 deploy/nginx-ssl.conf 片段，server_name 改为 api.yourdomain.com

upstream mengji_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;  # 临时：接受任意 Host；有域名后改为 api.yourdomain.com

    client_max_body_size 30M;

    location / {
        proxy_pass http://mengji_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 本地 uploads 模式时静态文件由 Node 托管；接 COS 后可删除此段
    location /uploads/ {
        proxy_pass http://mengji_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
